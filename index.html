<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroSelect | Selection UI</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap%22 rel="stylesheet">
</head>
<body>
 
    <div class="game-container">
<section class="hero-main">
<div class="badge">LENDÁRIO</div>
<div class="hero-content">
<h1>CYPHER <span>NODE</span></h1>
<p>Mestre das redes e infiltrador fantasma. Sua habilidade especial "Grid Overload" reorganiza a realidade dos dados.</p>
</div>
</section>
 
        <div class="stat-card energy">
<span class="label">ENERGIA</span>
<div class="bar"><div class="fill" style="width: 85%;"></div></div>
<span class="value">85%</span>
</div>
 
        <div class="stat-card power">
<span class="label">PODER DE ATAQUE</span>
<div class="bar"><div class="fill" style="width: 92%;"></div></div>
<span class="value">92/100</span>
</div>
 
        <section class="hero-gallery">
<div class="mini-card active" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=1')"></div>
<div class="mini-card" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=2')"></div>
<div class="mini-card" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=3')"></div>
<div class="mini-card" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=4')"></div>
<div class="mini-card" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=5')"></div>
<div class="mini-card" style="background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=6')"></div>
</section>
 
        <button class="select-btn">CONFIRMAR SELEÇÃO</button>
 
    </div>
 
</body>
</html>
